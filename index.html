<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <title>CCD Cam</title>
  <meta name="description" content="A cozy 2005 digital camera photo booth — snap warm, grainy memories." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=VT323&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <!-- Apply the saved paper style before first paint (no flash) -->
  <script>
    try { document.documentElement.dataset.paper = localStorage.getItem('ccdcam:paper') || 'blue'; }
    catch (e) { document.documentElement.dataset.paper = 'blue'; }
  </script>
</head>
<body>
  <!-- Hand-drawn doodles scattered on the "paper" (decorative) -->
  <div class="paper-doodles" aria-hidden="true">
    <svg class="doodle doodle--flower1" viewBox="0 0 100 100" fill="none" stroke="#6aa85f" stroke-width="5">
      <circle cx="50" cy="27" r="15" /><circle cx="73" cy="44" r="15" /><circle cx="64" cy="71" r="15" /><circle cx="36" cy="71" r="15" /><circle cx="27" cy="44" r="15" /><circle cx="50" cy="50" r="7" />
    </svg>
    <svg class="doodle doodle--star1" viewBox="0 0 100 100">
      <path fill="#f2c94c" stroke="#e0b43a" stroke-width="3" stroke-linejoin="round" d="M50 8 L61 38 L93 39 L68 59 L77 91 L50 72 L23 91 L32 59 L7 39 L39 38 Z" />
    </svg>
    <svg class="doodle doodle--cherry" viewBox="0 0 100 100">
      <path d="M52 20 C56 42 42 54 33 66" fill="none" stroke="#6aa85f" stroke-width="4.5" stroke-linecap="round" />
      <path d="M52 20 C60 40 68 52 76 63" fill="none" stroke="#6aa85f" stroke-width="4.5" stroke-linecap="round" />
      <circle cx="31" cy="76" r="15" fill="#d64c4c" /><circle cx="75" cy="70" r="15" fill="#d64c4c" />
    </svg>
    <svg class="doodle doodle--heart" viewBox="0 0 100 100">
      <path fill="#f2a6bf" d="M50 84 C10 56 16 22 39 24 C50 25 50 35 50 35 C50 35 50 25 61 24 C84 22 90 56 50 84 Z" />
    </svg>
    <svg class="doodle doodle--sparkle" viewBox="0 0 100 100">
      <path fill="#a9b6da" d="M50 8 C54 34 66 46 92 50 C66 54 54 66 50 92 C46 66 34 54 8 50 C34 46 46 34 50 8 Z" />
    </svg>
    <svg class="doodle doodle--flower2" viewBox="0 0 100 100" fill="none" stroke="#e58bad" stroke-width="5">
      <circle cx="50" cy="27" r="15" /><circle cx="73" cy="44" r="15" /><circle cx="64" cy="71" r="15" /><circle cx="36" cy="71" r="15" /><circle cx="27" cy="44" r="15" /><circle cx="50" cy="50" r="7" />
    </svg>
    <svg class="doodle doodle--star2" viewBox="0 0 100 100">
      <path fill="#f2c94c" stroke="#e0b43a" stroke-width="3" stroke-linejoin="round" d="M50 8 L61 38 L93 39 L68 59 L77 91 L50 72 L23 91 L32 59 L7 39 L39 38 Z" />
    </svg>
  </div>

  <!-- Decorative mode toolbar (Future scope; Remember active in v1) -->
  <nav class="toolbar" aria-label="Modes (decorative)">
    <button class="tab" type="button" disabled>▤ <span>Bloom</span></button>
    <button class="tab" type="button" disabled>▨ <span>Isolate</span></button>
    <button id="play-tab" class="tab" type="button" disabled aria-label="Play back your photos">♫ <span>Play</span></button>
    <button class="tab tab--active" type="button" aria-current="true">▣ <span>Remember</span></button>
    <button id="send-tab" class="tab" type="button" disabled aria-label="Download collage as PNG">➜ <span>Send</span></button>
  </nav>

  <main id="stage" class="stage">
    <!-- Prints scatter here, behind the camera -->
    <div id="prints" class="prints" aria-live="polite"></div>

    <!-- The camera mockup -->
    <div id="camera" class="camera" data-state="idle">
      <!-- Shutter, on the top edge, right side -->
      <button id="shutter" class="shutter" type="button" aria-label="Take photo">
        <span class="shutter__nub"></span>
      </button>

      <div class="camera__body">
        <!-- LCD (the star) -->
        <button id="lcd" class="lcd" type="button" aria-label="Viewfinder — tap to capture">
          <div class="lcd__bezel">
            <video id="feed" class="lcd__video" playsinline autoplay muted></video>
            <div class="lcd__grain" aria-hidden="true"></div>
            <div class="lcd__vignette" aria-hidden="true"></div>
            <div class="lcd__sheen" aria-hidden="true"></div>
            <div id="flash" class="lcd__flash" aria-hidden="true"></div>
            <div id="lcd-state" class="lcd__state" role="status"></div>
            <div id="hint" class="lcd__hint">tap the shutter</div>
          </div>
        </button>

        <!-- Control cluster -->
        <div class="controls">
          <div class="controls__top">
            <button id="playback-btn" class="btn-round" type="button" aria-label="Play back your photos" disabled>▶</button>
            <span class="btn-round" aria-hidden="true">◉</span>
          </div>

          <div class="dpad" aria-hidden="true">
            <span class="dpad__arrow dpad__arrow--up">▲</span>
            <span class="dpad__arrow dpad__arrow--right">▶</span>
            <span class="dpad__arrow dpad__arrow--down">▼</span>
            <span class="dpad__arrow dpad__arrow--left">◀</span>
            <span class="dpad__set">SET</span>
          </div>
          <div class="controls__disp">DISP</div>

          <div class="controls__ovals">
            <span class="btn-oval">MENU</span>
            <span class="btn-oval">BS</span>
          </div>

          <div class="controls__ports">
            <span class="port"><span class="port__dot"></span>USB</span>
            <span class="port"><span class="port__dot"></span>CHARGE</span>
          </div>
        </div>

        <!-- Wordmark -->
        <div class="wordmark" aria-hidden="true">⋲XILIM</div>

        <!-- Kawaii deco stickers -->
        <span class="deco deco--heart" aria-hidden="true">💗</span>
        <span class="deco deco--star1" aria-hidden="true">✦</span>
        <span class="deco deco--star2" aria-hidden="true">★</span>
        <span class="deco deco--flower" aria-hidden="true">🌸</span>
        <span class="deco deco--cherry" aria-hidden="true">🍒</span>
        <span class="deco deco--sparkle" aria-hidden="true">✧</span>
      </div>
    </div>
  </main>

  <!-- Background paper switcher -->
  <div id="paper-switch" class="paper-switch" role="group" aria-label="Background style">
    <button class="swatch swatch--blue" type="button" data-paper="blue" aria-label="Blue grid paper"></button>
    <button class="swatch swatch--red" type="button" data-paper="red" aria-label="Red grid paper"></button>
    <button class="swatch swatch--plain" type="button" data-paper="plain" aria-label="Plain paper"></button>
  </div>

  <!-- Sound toggle (muted by default, never autoplays) -->
  <button id="sound-toggle" class="sound-toggle" type="button" aria-pressed="false" aria-label="Toggle shutter sound">🔇</button>

  <script type="module" src="js/main.js"></script>
</body>
</html>
